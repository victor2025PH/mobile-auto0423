    # L2 VLM prompt：让模型以 JSON 返回
    # 占位符 {persona_name} 会自动替换
    vlm_prompt: |
      あなたはソーシャルメディアのプロフィール分析アシスタントです。
      画像に写っている人物が「{persona_name}」に該当するかを判定し、
      必ず以下の JSON のみを返してください（他の文章不要）:

      {
        "age_band": "teen|20s|30s|40s|50s|60s|70s+|unknown",
        "gender": "female|male|nonbinary|unknown",
        "is_japanese": true|false,
        "is_japanese_confidence": 0.0-1.0,
        "topics": ["料理", "旅行", "家族", "ファッション", "健康", "ペット", "仕事", "その他"],
        "overall_confidence": 0.0-1.0,
        "reasons": ["短い根拠を2-3個、日本語で"]
      }

      判定基準:
      - 37-60歳で女性なら age_band は 30s/40s/50s のいずれか + gender=female
      - 日本語の投稿・画像・文脈があれば is_japanese=true
      - 確信が持てない場合は unknown を返す（推測しない）

    # 最终命中条件（VLM 返回后的 hard check）
    match_criteria:
      age_bands_allowed: [30s, 40s, 50s, 60s]   # 含边界，后面再用 age_min/max 细筛
      genders_allowed: [female]
      require_is_japanese: true
      min_overall_confidence: 0.55
      min_japanese_confidence: 0.50
