# Geographic Content Strategy Configuration
#
# Per-country automation behavior:
#   - hashtags: TikTok search hashtags for feed training
#   - comments: comment templates in the target language
#   - engagement: like/comment/save probabilities per phase
#   - detection: text/emoji signals for content classification
#   - timezone: for smart scheduling alignment
#   - warmup: phase-specific behavior tuning

countries:
  italy:
    timezone: "Europe/Rome"
    language: "italian"
    flag_emoji: "🇮🇹"

    hashtags:
      popular:
        - "#italia"
        - "#italiano"
        - "#italiani"
        - "#madeinitaly"
        - "#roma"
        - "#milano"
        - "#napoli"
        - "#firenze"
