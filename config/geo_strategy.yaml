        - "#vitaitaliana"
        - "#modaitaliana"
      trending:
        - "#italiantiktok"
        - "#fyitalia"
        - "#tiktokit"

    # 种子账号: 意大利本土大号（粉丝中意大利人比例 >70%）
    # 选择标准: 1)意大利本地内容创作者 2)粉丝50K+ 3)意大利语内容为主
    seed_accounts:
      - "khaborossi"          # 意大利生活博主
      - "gianlucavacchi"      # 意大利富豪/网红
      - "chiaraferragni"      # 意大利时尚博主
      - "fedez"               # 意大利说唱歌手
      - "ilaryblasi"          # 意大利电视主持人
      - "mediaaborossi"       # 意大利媒体
      - "trash_italiano"      # 意大利流行文化
      - "willwoosh"           # 意大利 YouTuber
      - "caborossi"           # 意大利内容
      - "thefaborossi"        # 意大利博主

    comments:
      generic:
        - "Bellissimo! 🇮🇹"
        - "Fantastico 👏"
        - "Troppo bello!"
        - "Grande! 💪"
        - "Che bello!"
        - "Wow incredibile 🔥"
      food:
        - "Che buono! 😋"
        - "La vera cucina italiana 🍝"
      travel:
        - "Che posto meraviglioso! 😍"
        - "Italia sempre bella 🇮🇹"

    engagement:
      cold_start:
        like_probability: 0.08
        comment_probability: 0.00
        save_probability: 0.02
        target_boost: 1.5
      interest_building:
        like_probability: 0.18
        comment_probability: 0.03
        save_probability: 0.05
        target_boost: 2.0
      active:
        like_probability: 0.22
        comment_probability: 0.02
        save_probability: 0.04
        target_boost: 1.8

    detection:
      cities: ["roma", "milano", "napoli", "firenze", "venezia", "torino", "palermo", "bologna", "genova"]
      words: ["ciao", "grazie", "buongiorno", "buonasera", "bello", "italiano", "italiana"]
