# ── 多国化文案（按国家 ISO2 代码索引）──────────────────────────────────
# 当前启用 JP（日本 37-60 女性客群）；IT 保留作为 legacy 样板。
countries:

  # ── 🇯🇵 日本（默认目标客群：37-60 岁女性）────────────────────────────
  jp:
    language: ja
    # 引流账号渠道偏好（与 personas.jp_female_midlife.referral_priority 对齐）
    referral_priority: [line, instagram, whatsapp, telegram]

    # 加好友验证语（日本礼节要求必带）
    # 占位符 {name} 可缺省，占位符 {interest} 若传入会替换为"韓ドラ/手芸/旅行"等
    friend_request_notes:
      - "はじめまして🌸同じ{interest}好きで繋がりたくて、よろしければ仲良くしてください☕️"
      - "こんにちは！プロフィール拝見して素敵だなと思いました🌿よろしくお願いします"
      - "突然失礼します🙇‍♀️同世代で共通の話題があれば嬉しいです🌼"

    # 首次开场 DM（保守型，不直接引流，先建立关系）
    greeting_messages:
      - "はじめまして😊友達になってくれてありがとうございます🌸"
      - "こんにちは！フォロー返ししてくれてありがとう✨少しずつ仲良くしてください"
      - "{name}さん、繋がれて嬉しいです🌿素敵な投稿楽しみにしています"

    # 跟进 DM（第 2-3 次，开始切入引流）
    message_variants:
      - id: jp_v1_gentle
        name: 穏やか型（推奨）
        description: 敬语 + 低压力 + LINE 切换自然
        weight: 70
        greeting_messages:
          - "{name}さん、こんにちは☕️最近いかがお過ごしですか？"
          - "いつも楽しい投稿ありがとうございます🌸{name}さんのセンス素敵です"
        referral_line:
          - "もしよかったらLINEの方でお話ししませんか？ID: {line}（ご無理のない範囲で✨）"
          - "LINEだともう少しゆっくりお話できるので良かったらどうぞ🌿 {line}"
        referral_instagram:
          - "Instagram もやっています、よかったらどうぞ🌼 {instagram}"
      - id: jp_v2_direct
        name: 率直型（フォロー後 3 日経過）
        description: 直接切入，但仍带敬语
        weight: 30
        greeting_messages:
          - "{name}さん、一つお誘いしたいことがあるのですがお時間ありますか？"
        referral_line:
          - "詳しくはLINEでお伝えします → {line}"

    # 评论模板（共感型，绝不硬广）
    comment_templates:
      - "わかる～！うちも同じです🥹"
      - "素敵ですね🌸参考にさせていただきます"
      - "おしゃれ✨憧れます"
      - "ありがとうございます🌿今度試してみます"

  # ── 🇮🇹 意大利（legacy，原项目目标客群样板）────────────────────────
  it:
    language: it
    referral_priority: [whatsapp, telegram, instagram, line]
    friend_request_notes:
      - "Ciao {name}! Mi piacerebbe connettermi con te, abbiamo interessi in comune 🌟"
    greeting_messages:
      - "Ciao {name}! Grazie per il follow back! Mi piacciono molto i tuoi contenuti!"
      - "Hey {name}! Ho visto che mi segui, grazie! Parliamone!"
      - "Grazie {name} per il follow! I tuoi video sono fantastici!"

