# ═══════════════════════════════════════════════════════════════════════
# Facebook / TikTok 引流文案与账号配置（P2-UI Sprint 多国化）
# ═══════════════════════════════════════════════════════════════════════
# 说明：
#   * device_referrals 是每台设备的"主引流账号"（WA/TG/LINE/IG），
#     与 persona 的 referral_priority 共同决定下发私信时的渠道顺序。
#   * countries.* 按 ISO2 国家代码提供本地化文案，launch 时会根据
#     persona.country_code 自动选择对应语言模板。
#   * 旧版顶层 country: italy + greeting_messages[it] 保留作为向后兼容，
#     直到所有 automation 层切换到 countries[*] 读取。
# ═══════════════════════════════════════════════════════════════════════

