# ═══════════════════════════════════════════════════════
# 账号人设库 — 按目标国家+人群定义"伪垂类"策略
# 批判者指出：无垂类账号算法无法推流。
# 解法：给每个账号分配伪垂类，内容围绕垂类生成，
#        但最终CTA引流到我们的聊天平台。
