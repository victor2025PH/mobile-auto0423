version: "3.8"

services:
  openclaw:
    build: .
    container_name: openclaw-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data           # SQLite 持久化
      - ./logs:/app/logs           # 日志 + 截图
      - ./config:/app/config       # 设备配置
    environment:
      - ADB_SERVER_HOST=host.docker.internal
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
