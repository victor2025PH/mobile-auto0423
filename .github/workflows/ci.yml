name: OpenClaw CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Syntax & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Syntax check all Python files
        run: |
          python -c "
          import py_compile, os, sys
          errors = 0
          for root, dirs, files in os.walk('src'):
              dirs[:] = [d for d in dirs if d != '__pycache__']
              for f in files:
                  if f.endswith('.py'):
                      try:
                          py_compile.compile(os.path.join(root, f), doraise=True)
                      except py_compile.PyCompileError as e:
                          print(f'ERROR: {e}', file=sys.stderr)
                          errors += 1
          if errors:
              print(f'{errors} syntax errors found')
              sys.exit(1)
          print('All Python files syntax OK')
          "

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: |
          python -m pytest tests/ -q --tb=short
        env:
          PYTHONDONTWRITEBYTECODE: 1

  e2e:
    name: E2E (Playwright Chromium)
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements-e2e.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-e2e.txt
          python -m playwright install chromium --with-deps

      - name: Run E2E tests
        run: |
          python -m pytest tests/e2e -m e2e -v --tb=short --tracing=retain-on-failure
        env:
          PYTHONDONTWRITEBYTECODE: 1

      - name: Upload Playwright traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test, e2e]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t openclaw:${{ github.sha }} .

      - name: Verify Docker image
        run: |
          docker run --rm openclaw:${{ github.sha }} python -c "from src.host.api import app; print('FastAPI app OK')"
