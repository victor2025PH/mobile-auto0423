name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-xdist

      - name: Collect tests (fast fail on import errors)
        run: python -m pytest tests/ --collect-only -q

      - name: Run regression (parallel)
        # pytest.ini 已配 addopts = -m "not e2e", 自动跳 e2e marker
        # -n auto 让 xdist 按 runner core 数并行, 本地实测 7 min → 68s (6x)
        run: python -m pytest tests/ -n auto --tb=line -p no:warnings -q
